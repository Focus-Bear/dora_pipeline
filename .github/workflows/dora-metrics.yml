name: DORA Metrics Pipeline

on:
  schedule:
    - cron: "0 12 * * *"   # daily at 12:00 UTC
  workflow_dispatch:

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        # No token override needed — we are NOT pushing back to the repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run DORA pipeline
        env:
          GH_API_READ_TOKEN: ${{ secrets.GH_API_READ_TOKEN }}
          OWNER: ${{ secrets.OWNER }}
          REPO: ${{ secrets.REPO }}
          SENTRY_TOKEN: ${{ secrets.SENTRY_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: python dora_pipeline.py

      - name: Run Repo Summary script
        env:
          GH_API_READ_TOKEN: ${{ secrets.GH_API_READ_TOKEN }}
        run: python repo_summary.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Upload data files to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          for file in dora.json dora.sqlite repo_summary.csv repo_summary_7d.csv repo_summary_30d.csv; do
            if [ -f "$file" ]; then
              echo "Uploading $file to R2..."
              wrangler r2 object put "${R2_BUCKET_NAME}/${file}" --file="$file" --remote
            else
              echo "Warning: $file not found, skipping"
            fi
          done

      - name: Build Vite project
        env:
          VITE_R2_BASE_URL: ${{ secrets.VITE_R2_BASE_URL }}
          NODE_ENV: production
        run: npx vite build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy dist/public \
            --project-name=dora-pipeline \
            --branch=main
