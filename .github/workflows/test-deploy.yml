name: TEST - Deploy Only (skip data calc)

# Fast iteration workflow for debugging the Cloudflare Pages deploy /
# token auth without waiting ~45m for the Python DORA pipeline to run.
# Builds the Vite frontend and deploys to Pages using whatever data is
# already in R2. Manual trigger only.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Wrangler
        run: npm install -g wrangler

      # Prints token identity + Pages project list so the log reveals
      # whether the CLOUDFLARE_API_TOKEN secret can actually see Pages.
      # `|| true` so a failure here still lets the deploy step run and
      # produce its own error for comparison.
      - name: Wrangler auth debug
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== wrangler whoami ==="
          wrangler whoami || true
          echo "=== wrangler pages project list ==="
          wrangler pages project list || true

      - name: Build Vite project
        env:
          VITE_R2_BASE_URL: ${{ secrets.VITE_R2_BASE_URL }}
          NODE_ENV: production
        run: npx vite build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy dist/public \
            --project-name=dora-pipeline \
            --branch=main
